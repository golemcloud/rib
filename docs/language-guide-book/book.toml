[book]
title = "Rib language guide"
description = "Rib: a small expression language for WebAssembly components"
authors = ["Rib contributors"]
language = "en"

[build]
build-dir = "book"

[output.html]
default-theme = "rust"
# Project Pages URL is https://golemcloud.github.io/rib/ — required for sidebar TOC links, search, and 404.
site-url = "/rib/"
git-repository-url = "https://github.com/golemcloud/rib"
edit-url-template = "https://github.com/golemcloud/rib/edit/main/docs/language-guide.md"
# In-page headings in the left sidebar (mdBook ≥ 0.5; default true — set explicitly for clarity).
sidebar-header-nav = true

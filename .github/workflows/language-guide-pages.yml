# Build docs/language-guide.md with mdBook and push HTML to branch `gh-pages` for GitHub Pages.
name: Language guide (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - "docs/language-guide.md"
      - "docs/example.wit"
      - "docs/language-guide-book/**"
      - ".github/workflows/language-guide-pages.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_VERSION="0.5.2"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Build book
        run: |
          cd docs/language-guide-book
          chmod +x build.sh
          ./build.sh

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/language-guide-book/book
          publish_branch: gh-pages

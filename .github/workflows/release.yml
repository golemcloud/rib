name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Same pattern as golemcloud/golem publish-golem-rust.yaml:
      # get-version-action + sed 0.0.0 → tag version + cargo publish --allow-dirty.
      - id: get_version
        uses: battila7/get-version-action@v2

      - name: Publish workspace to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.version-without-v }}"
          sed -i "s/0.0.0/$VERSION/g" rib-lang/Cargo.toml
          sed -i "s/0.0.0/$VERSION/g" rib-repl/Cargo.toml
          sed -i "s/0.0.0/$VERSION/g" Cargo.toml
          cargo publish --workspace --allow-dirty
